
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autumn Takahashi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="web.css">
  </head>
  <body>
 
    <div class="container">
 
      <!-- Header -->
      <header class="header">
        <h1 class="name">Autumn Takahashi</h1>
        <div class="divider"></div>
        <p class="tagline">Neuro</p>
      </header>
 
      <!-- Navigation -->
      <nav class="nav">
        <a class="nav-link active" onclick="show('about', this)">About</a>
        <a class="nav-link" onclick="show('projects', this)">Projects</a>
      </nav>
 
      <!-- About Section -->
      <section id="about" class="section visible">
        <div class="about-text">
          <p>Hi, my name is Autumn!</p>
        </div>
      </section>
 
      <!-- Projects Section -->
      <section id="projects" class="section">
        <div class="projects-grid">
 
          <div class="project-card">
            <p class="project-tag">Coming soon</p>
            <p class="project-title">Project one</p>
            <p class="project-desc">A placeholder for the next thing I'll be working on.</p>
          </div>
 
          <div class="project-card">
            <p class="project-tag">Coming soon</p>
            <p class="project-title">Project three</p>
            <p class="project-desc">More to come — check back soon.</p>
          </div>
 
        </div>
      </section>
 
    </div><!-- end .container -->
 
    <script src="java-website.js"></script>
    <script>
      function show(id, el) {
        document.querySelectorAll('.section').forEach(function(s) {
          s.classList.remove('visible');
        });
        document.querySelectorAll('.nav-link').forEach(function(a) {
          a.classList.remove('active');
        });
        document.getElementById(id).classList.add('visible');
        el.classList.add('active');
      }
    </script>
 
  </body>
</html>
